 <!DOCTYPE html>
<html>
<head>
<title>Gacha Sorter</title>
<style>

html,body{
  margin:0;
  padding:0;
  width:100%;
  font-family: Arial, sans-serif;
  color: white;
  background: rgb(32,32,32);
  }
  
.characterImg {
  display: block;
  margin: auto;
  padding-top: 5%;
  padding-bottom: 5%;
  width: 65%;
  aspect-ratio: 1 / 1;
  object-fit: cover;
}

.selectionImage {
  width: 50px;
  aspect-ratio: 1 / 1;
  object-fit: cover;
}

button {
    margin: 0 auto;
    display: block;
	margin-top:5%;
	font-size: 40px;
	color: white;
	border-radius: 5%;
	background: rgb(48,48,48);
	border: 1px solid black;
}

#Main {
  display: block;
  margin: auto;
  width: 60%;
  height: 60%;
  font-family: Arial, sans-serif;
  margin-top: 4%;
}

.left {
  height:100%;
  border:1px solid black;
  float: left;
  width: 40%;
}
.middle {
  height:100%;
  float: left;
  width: 18%;
  padding-top: 5%;
  padding-bottom: 5%;
}
.right {
  height:100%;
  border:1px solid black;
  float: left;
  width: 40%;
}
.label{
	text-align: center;
	padding-bottom: 5%;
}

.selected{background-color: lightblue;}

table {
  margin: auto;
  width: 30%;
  font-family: Arial, sans-serif;
  font-size: 20px;
  text-align: center;
}

table, thead {
  border: 1px solid black;
  border-collapse: collapse;
}

th {
  padding-top: 10px;
  padding-bottom: 15px;
  padding-left: 2%;
  padding-right: 2%;
}

td {
  min-width:100px;
  min-height:30px;
  padding-top: 10px;
  padding-bottom: 15px;
  padding-left: 2%;
  padding-right: 2%;
}

#backButton {
    position:fixed;
    right:0;
    top:0;
	margin-right:50px;
}

#imageNumberSelector {
	padding-top:5%;
	padding-left:10px;
    position:fixed;
    left:0;
    top:0;
	margin: 0 auto;
	display: block;
}

tr:nth-child(even) { background: rgb(48,48,48);}

</style>
</head>
<body>
<h1 style="text-align: center;padding-bottom: 3%"> Gacha Character Sorter </h1>

<!-- The start frame where the user defines some options-->

	<form id="zzzElements" onclick="changeElements(event)" style="display:none">
	<br>
		<input type="checkbox" id="zzzAll" name="zzzElements" value="zzzAll" checked="checked">
		<label for="zzzAll">All Elements</label> 
		
		<input type="checkbox" id="zzzPhysical" name="zzzElements" value="physical" checked="checked">
		<label for="zzzPhysical"><img src="https://api.hakush.in/zzz/UI/IconPhysical.webp" alt="Physical" class="selectionImage"> </label>
		
		<input type="checkbox" id="zzzFire" name="zzzElements" value="fire" checked="checked">

		<input type="checkbox" id="zzzIce" name="zzzElements" value="ice" checked="checked">

		<input type="checkbox" id="zzzElectric" name="zzzElements" value="electric" checked="checked">

	<form id="wuwaElements" onclick="changeElements(event)" style="display:none">
	<br>
		<input type="checkbox" id="wuwaAll" name="wuwaElements" value="wuwaAll" checked="checked">
		<label for="wuwaAll">All Elements</label> 
		
		<input type="checkbox" id="wuwaIce" name="wuwaElements" value="ice" checked="checked">

</div>

<!-- The Main frame where the user chooses between characters-->
<div id="frame" style="display:none">

	<div id="Main" >
		<span id="left" class="left">
			<img src="" class="characterImg"> 
			<div class="label">Left name</div>
		</span>

		<span id=middle class="middle">
			<h2 id="Round" style="text-align:center">
				<span id="counter">1</span> / <span id="numRounds">?</span>
			</h2>
			<button id="rarityButton" type="button" onclick="notSupported(event)" >Tie</button>
			<button id="copiumButton" type="button" style="margin-top:40%" onclick="notSupported(event)" >Undo</button>
		</span>

		<span id=right class="right">
			<img src="" class="characterImg">
			<div class="label">Right name</div>
		</span>
	</div>
</div>


<!-- The table frame that shows the result-->
<div id="tableFrame" style="display:none">
	<button id="backButton" type="button" style="margin-bottom: 5%;" onclick="notSupported(event)" >Return!</button>
	
	<form id="imageNumberSelector">
	<label for="imgNumbers">Number of images:</label>
		<select id="imgNumbers" name="imgNumbers" onchange="showResults()">
			<option value="none">None</option>
			<option value="3">3</option>
			<option value="5">5</option>
			<option value="10">10</option>
			<option value="all">All</option>
		</select>
	</form>
	
	<table id="resultTable">
	
	</table>
	
</div>

<script>
	document.getElementById("startButton").addEventListener("click", start);
	
	function start(){
		document.getElementById("startFrame").style.display = 'none';
		
		// Initialize arr with the data from the selected game
        let gameSelector = document.getElementsByName('game');
		for (i = 0; i < gameSelector.length; i++) {
			if (gameSelector[i].checked){
				console.log("Selected " + gameSelector[i].id);
				switch(gameSelector[i].id) {
				  case "all":
					arr = initalizeArrayWithZZZ();
					arr = arr.concat(initalizeArrayWithHSR());
					arr = arr.concat(initalizeArrayWithWuWa());
					arr = arr.concat(initalizeArrayWithGenshin());
					console.log(arr);
					break;
				  case "zzz":
					arr = initalizeArrayWithZZZ();
					break;
				  case "hsr":
					arr = initalizeArrayWithHSR();
					break;
				  case "wuwa":
					arr = initalizeArrayWithWuWa();
					break;
				  case "genshin":
				  default:
					arr = initalizeArrayWithGenshin();
				}
			}
        }
		//arr = testInit();
		
		if(arr.length < 2){
			alert("Not enough options available. Immediately show results");
			showResults();
			return;
		}
		initializeFirstOptions();
		document.getElementById("Main").addEventListener("click", activateSelection);
		setNumRounds();
	}
	
	let arr = [];
	
	let next = 2;
	let left = 0;
	let leftIntern = 0;
	let right = 1;
	let rightIntern = 0;
	let finishVar = false;
	
	let runningArray = [];
	let curSubarray = [];
	
	
	//------- Logic behind the sorting
	function activateSelection(){
		if(finishVar){
			// If finished, we should no longer sort
			alert("Done");
			return;
		}
		const selected = event.target.closest('span');
		console.log("Next: " + next);
		console.log(arr);
		
		if(selected.classList.contains("left")){
			selected.classList.add('selected');
			setTimeout(() => selected.classList.remove('selected'), 200);
			selectContentLeft(selected);
		} else if(selected.classList.contains("right")) {
			selected.classList.add('selected');
			setTimeout(() => selected.classList.remove('selected'), 200);
			selectContentRight(selected);
		} else {
			// TODO undo and tie buttons
			const element = event.target;
			element.classList.add('selected');
			setTimeout(() => element.classList.remove('selected'), 200);
			console.log("Neither left nor right was clicked");
		}
	}
	
	function selectContentLeft(selected){
		// Add new preferred element to current subarray
		curSubarray.push(arr[left][leftIntern]);
		leftIntern++;
			
		let newContent;
		if(arr[left].length === leftIntern){
			completeRemainder();
		} else {
			newContent = arr[left][leftIntern];
			update(selected, newContent);
		}
	}
	
	function selectContentRight(selected){
		// Add new preferred element to current subarray
		curSubarray.push(arr[right][rightIntern]);
		rightIntern++;
			
		let newContent;
		if(arr[right].length === rightIntern){
			completeRemainder();
		} else {
			newContent = arr[right][rightIntern];
			update(selected, newContent);
		}
	}
	
	function update(selected, newContent){
		// Changes the content of the selected element
		console.log("Load " + newContent);
		selected.getElementsByTagName('div')[0].innerHTML = newContent.name;
		selected.getElementsByTagName('img')[0].src = newContent.imageSrc;
		selected.getElementsByTagName('img')[0].alt = newContent.name;
	}
	
	function completeRemainder(){
		// Adds all remaining elements from the right and then the left, and updates pointers and html content accordingly
		// If called if either left or right is finished, the order in which remaining elements are added is irrelevant
		finishRight();
		finishLeft();
		
		runningArray.push(curSubarray);
		console.log("Adding to new array: " + curSubarray.toString());
		console.log("size of new array: " + runningArray.length);
		curSubarray = [];
		
		console.log((next === arr.length ) + ", " + ( next + 1 === arr.length))
		if(next === arr.length || next + 1 === arr.length){
			// Examined everything once (except one subarray if there is an odd number) so reset pointers
			console.log("Run finish");
			finish();
			if(finishVar) return;
		}
		
		// update left
		newContent = arr[next][0];
		update(document.getElementById("left"), newContent); 
		leftIntern = 0;
		left = next;
		next++;
		
		// update right
		newContent = arr[next][0];
		update(document.getElementById("right"), newContent); 
		rightIntern = 0;
		right = next;
		next++;
	}
	
	function finishRight(){
	// Add the remaining elements from the right subarray to the subarray
		while(rightIntern < arr[right].length){
			curSubarray.push(arr[right][rightIntern]);
			rightIntern++;
		}
	}
	
	function finishLeft(){
	// Add the remaining elements from the left subarray to the current subarray
		while(leftIntern < arr[left].length){
			curSubarray.push(arr[left][leftIntern]);
			leftIntern++;
		}
	}
		
	
	function finish(){
		// Reset pointers and arrays, and potentially stop further selection if finished
		console.log("All elements inspected");
		document.getElementById("counter").innerHTML = +document.getElementById("counter").innerHTML + 1;
		if(arr.length % 2 === 1){
			// Add the last element that was not inspected in the last round to the front
			runningArray.unshift(arr[arr.length - 1]);
		}
		
		arr = runningArray;
		runningArray = [];
		console.log("New array: " + arr.toString());
		next = 0;
		if(arr.length === 1){
			// Everything was sorted
			finishVar = true;
			console.log("Everything sorted");
			
			// Flatten array 
			arr = arr[0];
			
			document.getElementById("Main").style.display = 'none';
			showResults();
		}
	}
	
	function showResults(){
		console.log("Change table");
		
		document.getElementById("startFrame").style.display = 'none';
		document.getElementById("frame").style.display = 'none';
		document.getElementById("tableFrame").style.display = '';
		
		let numImages = document.getElementById("imgNumbers").value;
		console.log(numImages);
		if(numImages === "none"){
			numImages = 0;
		} else if(numImages === "all"){
			numImages = arr.length;
		} else {
			numImages = +numImages;
		}
		console.log(numImages);
		createTable(numImages);
	}
	
	function createTable(numImages){
		// https://stackoverflow.com/questions/14643617/create-table-using-javascript
		const tbl = document.getElementById('resultTable');
		tbl.innerHTML = "";
		
		let orderArrayHeader = ["Rank", "", "Name"];
		let thead = document.createElement('thead');

		tbl.appendChild(thead);
		for (let i = 0; i < orderArrayHeader.length; i++) {
			thead.appendChild(document.createElement("th")).
				  appendChild(document.createTextNode(orderArrayHeader[i]));
		}
		
		for (let i = 0; i < arr.length; i++) {
			const tr = tbl.insertRow();
			
			let td = tr.insertCell();
			td.appendChild(document.createTextNode(i + 1));
			
			td = tr.insertCell();
			if(i < numImages){
				const img = document.createElement('img');
				img.src = arr[i].imageSrc;
				td.appendChild(img);
			}
			
			td = tr.insertCell();
			td.appendChild(document.createTextNode(arr[i].name));
		}
	}
	
	function setNumRounds(){
		// Calculate how many rounds are needed to compare everything and set it in the html
		let numRounds = Math.ceil(Math.log2(arr.length));
		console.log(2**numRounds, arr.length);
		document.getElementById("numRounds").innerHTML = numRounds;
	}
	
	function initializeFirstOptions(){
		document.getElementById("left").getElementsByTagName('div')[0].innerHTML = arr[0][0].name;
		document.getElementById("left").getElementsByTagName('img')[0].src = arr[0][0].imageSrc;
		document.getElementById("left").getElementsByTagName('img')[0].alt = arr[0][0].name;
		console.log(document.getElementById("left").getElementsByTagName('img')[0].classList);
		
		document.getElementById("right").getElementsByTagName('div')[0].innerHTML = arr[1][0].name;
		document.getElementById("right").getElementsByTagName('img')[0].src = arr[1][0].imageSrc;
		document.getElementById("right").getElementsByTagName('img')[0].alt = arr[1][0].name;
		document.getElementById("frame").style.display = '';
	}
	
	//----- Initizialize arrays with fixed values	
	function initalizeArrayWithGenshin(){
		let newArr = [];
		const include4Stars = document.getElementById("raritySelector").checked;

	function changeElements(event){
		// Mark all boxes or unmark the "all elements" box
		if(event.target.tagName.toLowerCase() === 'input'){
			if(event.target.value.includes("All") && event.target.checked){
				// Mark all other options
				let children = event.target.closest('form').children;
				for (let i = 0; i < children.length; i++) {
					children[i].checked = true;
				}
			} else if(!event.target.checked){
				// Unmark the all option
				const parentForm = event.target.closest('form');
				parentForm.querySelector('input').checked = false;
			}
		}
	}
	
	function changeElementsDisplayed(event){
		if(event.target.tagName.toLowerCase() === 'input'){
			if(event.target.value === "all"){
				// Show all element options 
				document.getElementById("genshinElements").style.display = '';
				document.getElementById("hsrElements").style.display = '';
				document.getElementById("zzzElements").style.display = '';
				document.getElementById("wuwaElements").style.display = '';
				return;
			}
			// First hide all, and then show the one that was clicked on 
			document.getElementById("genshinElements").style.display = 'none';
			document.getElementById("hsrElements").style.display = 'none';
			document.getElementById("zzzElements").style.display = 'none';
			document.getElementById("wuwaElements").style.display = 'none';
			
			console.log(event.target.value + "Elements");
			document.getElementById(event.target.value + "Elements").style.display = '';
		}
	}
	
	function capitalizeFirstLetter(val) {
		return String(val).charAt(0).toUpperCase() + String(val).slice(1);
