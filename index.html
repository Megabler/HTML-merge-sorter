<!-- The Main frame where the user chooses between characters-->
<div id="frame" style="display:none">

	<div id="Main" >
		<span id="left" class="left">
			<img src="" class="characterImg"> 
			<div class="label">Left name</div>
		</span>

		<span id=middle class="middle">
			<h2 id="Round" style="text-align:center">
				Round <span id="roundCounter">1</span> / <span id="numRounds">?</span>
			</h2>
			<h2 id="Round" style="text-align:center">
				<span id="roundPercent">0</span>%
			</h2>
			<button id="tieButton" type="button">Tie</button>
			<button id="undoButton" type="button" style="margin-top:40%">Undo</button>
		</span>

		<span id=right class="right">
			<img src="" class="characterImg">
			<div class="label">Right name</div>
		</span>
	</div>
</div>


<!-- The table frame that shows the result-->
<div id="tableFrame" style="display:none">
	<button id="backButton" class="tableButton" type="button" style="margin-bottom: 5%;" onclick="notSupported(event)" >Return!</button>
	
	<button id="tableToImageButton" class="tableButton" type="button" style="margin-bottom: 5%;top: 75px;" onclick="convertToImage(event)" >Download Table</button>
	
    <div id="tableImageLink" class="tableButton" style="top: 250px">
       <!-- Result will appear be here -->
	</div>
	
	<form id="imageNumberSelector">
	<label for="imgNumbers">Number of images:</label>
		<select id="imgNumbers" name="imgNumbers" onchange="showResults()">
			<option value="none">None</option>
			<option value="3">3</option>
			<option selected value="5">5</option>
			<option value="10">10</option>
			<option value="all">All</option>
		</select>
	</form>
	
	<table id="resultTable">
	
	</table>

<!-- taken from https://stackoverflow.com/questions/53757970/downloading-data-tables-from-html-as-image  and  https://stackoverflow.com/questions/30372417/html2canvas-not-rendering-image-externally-hosted-images -->
<script type="text/javascript" src="https://github.com/niklasvh/html2canvas/releases/download/0.5.0-alpha1/html2canvas.js"></script>
<script>
	//convert table to image            
	function convertToImage() {
	var resultDiv = document.getElementById("tableImageLink");
	html2canvas(document.getElementById("resultTable"), {
		useCORS: true, // taken from https://stackoverflow.com/questions/30372417/html2canvas-not-rendering-image-externally-hosted-images
		onrendered: function(canvas) {
			var img = canvas.toDataURL("image/png");
			tableImageLink.innerHTML = '<a download="test.jpeg" href="'+img+'">Download table as png!</a>';
			}
	});
	}        
	//click event
	var convertBtn = document.getElementById("tableToImageButton");
	convertBtn.addEventListener('click', convertToImage);
</script>
